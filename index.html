<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitty Feeder Tracker 🐾</title>

  <link rel="icon" type="image/png" sizes="256x256" href="icon_256.png">
  <link rel="apple-touch-icon" href="icon_256.png">
  <link rel="manifest" href="manifest.json">

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
   (function(){
      emailjs.init("Ztxo_SR9FQ2rRv2lp");
   })();
  </script>

  <style>
    /* 🌸 Cute Pink Theme & Mobile Styling */
    body {
      background-color: #ffe6ea;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      color: #ff4d88;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    
    .container {
      background: white;
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 8px 15px rgba(255, 105, 180, 0.2);
      width: 100%;
      max-width: 350px;
    }

    h1 { font-size: 1.8em; margin-bottom: 5px; }
    h3 { font-size: 1.1em; margin-bottom: 10px; color: #ff6699; }

    .section {
      background-color: #fff0f3;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      border: 2px dashed #ffb3c6;
    }

    input, select {
      width: 90%;
      padding: 10px;
      border-radius: 10px;
      border: 2px solid #ffccdd;
      outline: none;
      font-size: 1em;
      color: #ff4d88;
      background-color: white;
    }

    button {
      background-color: #ff85a2;
      border: none;
      padding: 15px 20px;
      border-radius: 15px;
      color: white;
      font-weight: bold;
      font-size: 1.1em;
      width: 100%;
      margin: 8px 0;
      box-shadow: 0 5px 0 #ff4d88;
      cursor: pointer;
      transition: 0.1s;
    }

    button:active {
      transform: translateY(5px);
      box-shadow: none;
    }

    button:disabled {
      background-color: #e0e0e0;
      box-shadow: none;
      color: #999;
      transform: none;
      cursor: not-allowed;
    }

    .log {
      font-size: 0.95em;
      color: #cc0052;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Kitty Feeder 🐱🎀</h1>
    <p style="margin-top: 0; font-size: 0.9em;">Help Minni getting fat!</p>

    <div class="section">
      <h3>📱 Notification Settings</h3>      
      <select id="emailSelect">
        <option value="johanna.mauritz.i@gmail.com">🌸 johanna.mauritz.i@gmail.com</option>
        <option value="afriedreich@yahoo.de">🎀 afriedreich@yahoo.de</option>
      </select>
    </div>

    <div class="section">
      <h3>👤 Who is feeding the cats?</h3>
      <select id="userSelect">
        <option value="🌸 Mom">🌸 Katzenmama</option>
        <option value="🎀 Fluffy's Dad">🎀 Katzenoma</option>
      </select>
    </div>

    <div class="section">
      <h3>✅ Today's Tasks</h3>
      <button id="morningBtn" onclick="completeTask('Morning Meal')">☀️ Morning Feeding</button>
      <button id="eveningBtn" onclick="completeTask('Evening Meal')">🌙 Evening Feeding</button>
    </div>

    <div class="log" id="logArea">
      <p>Waiting for the first meal... 🐾</p>
    </div>
  </div>

  <script>
    // Bilder Platzhalter
    const bildFluffysMom = "catfeed_img_try.jpg";
    const bildFluffysDad = "catfeed_img_try.jpg";

    function completeTask(taskName) {
      // 1. Hole die Werte aus den Dropdowns
      const user = document.getElementById('userSelect').value;
      const selectedEmail = document.getElementById('emailSelect').value;
      
      // 2. Zeitstempel erstellen
      const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

      // 3. E-Mail Text zusammenbauen
      const messageText = `YAY! ${user} hat gerade das ${taskName} um ${time} erledigt! 😻`;

      // 4. Erstelle das Objekt mit den Daten für EmailJS
      var templateParams = {
          message: messageText, // Schickt jetzt die genaue Uhrzeit und den Namen mit!
          target_email: selectedEmail 
      };

      // 5. Sende es an EmailJS
      emailjs.send('service_shg7z2k', 'template_bfe8qgj', templateParams)
          .then(function(response) {
             console.log('Erfolgreich gesendet!', response.status, response.text);
             // Du könntest hier auch ein alert("E-Mail wurde gesendet!") einbauen
          }, function(error) {
             console.log('Fehler beim Senden...', error);
             alert("Oops! Die E-Mail konnte nicht gesendet werden.");
          });

      // 6. UI auf der Website aktualisieren (Button deaktivieren)
      document.getElementById('logArea').innerHTML = `<p>😸 ${messageText}</p>`;
      
      if(taskName === 'Morning Meal') {
        document.getElementById('morningBtn').disabled = true;
        document.getElementById('morningBtn').innerText = "☀️ Morgen (Erledigt!)";
      } else {
        document.getElementById('eveningBtn').disabled = true;
        document.getElementById('eveningBtn').innerText = "🌙 Abend (Erledigt!)";
      }
    }
  </script>

</body> 
</html>
